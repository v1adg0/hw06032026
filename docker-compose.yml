services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: weather
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "50052:50051"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/weather?sslmode=disable
      GRPC_PORT: "50051"
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      FETCH_INTERVAL: "15m"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
